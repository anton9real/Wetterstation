<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wetterstation Live-Daten</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f2f5; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 150px; }
    </style>
</head>
<body>
    <h1>Live-Wetterdaten (Eschwege)</h1>
    <div class="container">
        <div class="card"><h3>Temperatur</h3><p id="temp">--</p> °C</div>
        <div class="card"><h3>Luftfeuchtigkeit</h3><p id="hum">--</p> %</div>
        <div class="card"><h3>Luftdruck</h3><p id="press">--</p> hPa</div>
    </div>

    <script>
        const channelID = "3413123";
        const url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json`;

        async function fetchWetterdaten() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('temp').innerText = parseFloat(data.field1).toFixed(1);
                document.getElementById('hum').innerText = parseFloat(data.field2).toFixed(1);
                document.getElementById('press').innerText = parseFloat(data.field3).toFixed(0);
            } catch (error) {
                console.error("Fehler beim Laden der Daten:", error);
            }
        }

        // Daten alle 15 Sekunden aktualisieren
        fetchWetterdaten();
        setInterval(fetchWetterdaten, 15000);
    </script>
</body>
</html>
